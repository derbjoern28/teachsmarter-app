<!DOCTYPE html>
<html>
<head><title>TeachSmarter Icon Generator</title></head>
<body>
<h2>Icon Generator — Einmalig ausführen</h2>
<p>Klicke auf "Generieren", dann werden die PNG-Dateien heruntergeladen.</p>
<button onclick="generate()">Icons generieren (192 + 512)</button>
<canvas id="c" style="display:none"></canvas>
<script>
function drawIcon(size){
  const c = document.getElementById('c');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size * 0.218; // rounded corners ~112/512
  // Background
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0);
  ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r);
  ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size);
  ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r);
  ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  ctx.fillStyle = '#3BA89B';
  ctx.fill();
  // Letter T
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.font = `700 ${size*0.605}px Georgia,serif`;
  ctx.fillText('T', size/2, size*0.7);
}

function download(dataUrl, filename){
  const a = document.createElement('a');
  a.href = dataUrl; a.download = filename; a.click();
}

function generate(){
  [192, 512].forEach(size => {
    drawIcon(size);
    const c = document.getElementById('c');
    download(c.toDataURL('image/png'), `ts-icon-${size}.png`);
  });
  alert('Fertig! Lege ts-icon-192.png und ts-icon-512.png in denselben Ordner wie manifest.json.');
}
</script>
</body>
</html>
