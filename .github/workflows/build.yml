name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # Für Azure Trusted Signing OIDC

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Convert PNG to ICNS
        run: |
          mkdir -p build/icon.iconset
          sips -z 16 16     ts-icon-app.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32     ts-icon-app.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     ts-icon-app.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64     ts-icon-app.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   ts-icon-app.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256   ts-icon-app.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   ts-icon-app.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512   ts-icon-app.png --out build/icon.iconset/icon_256x256@2x.png
          cp ts-icon-app.png build/icon.iconset/icon_512x512.png
          iconutil -c icns build/icon.iconset -o ts-icon.icns

      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: TeachSmarter-mac
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    env:
      WIN_CSC_BASE64:        ${{ secrets.WIN_CSC_BASE64 }}
      WIN_CSC_PASSWORD:      ${{ secrets.WIN_CSC_PASSWORD }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ATS_ACCOUNT:           ${{ secrets.ATS_ACCOUNT }}
      ATS_PROFILE:           ${{ secrets.ATS_PROFILE }}
      ATS_ENDPOINT:          ${{ secrets.ATS_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      # ── Fallback: PFX-Zertifikat (falls WIN_CSC_BASE64 gesetzt) ──────────
      - name: Decode & import PFX certificate
        if: env.WIN_CSC_BASE64 != ''
        shell: powershell
        run: |
          $cert = [Convert]::FromBase64String("$env:WIN_CSC_BASE64")
          $certPath = "$env:RUNNER_TEMP\certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $cert)
          echo "WIN_CSC_LINK=$certPath" >> $env:GITHUB_ENV

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK:         ${{ env.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ env.WIN_CSC_PASSWORD }}

      # ── Azure Trusted Signing (Priorität — gibt sofort SAC-Vertrauen) ─────
      - name: Sign EXE with Azure Trusted Signing
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id:              ${{ env.AZURE_TENANT_ID }}
          azure-client-id:              ${{ env.AZURE_CLIENT_ID }}
          azure-client-secret:          ${{ env.AZURE_CLIENT_SECRET }}
          endpoint:                     ${{ env.ATS_ENDPOINT }}
          trusted-signing-account-name: ${{ env.ATS_ACCOUNT }}
          certificate-profile-name:     ${{ env.ATS_PROFILE }}
          files-folder:                 dist
          files-folder-filter:          exe
          file-digest:                  SHA256
          timestamp-rfc3161:            http://timestamp.acs.microsoft.com
          timestamp-digest:             SHA256

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TeachSmarter-win
          path: dist/*.exe
