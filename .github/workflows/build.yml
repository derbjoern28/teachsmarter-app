name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Convert PNG to ICNS
        run: |
          mkdir -p build/icon.iconset
          sips -z 16 16     ts-icon-app.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32     ts-icon-app.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     ts-icon-app.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64     ts-icon-app.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   ts-icon-app.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256   ts-icon-app.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   ts-icon-app.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512   ts-icon-app.png --out build/icon.iconset/icon_256x256@2x.png
          cp ts-icon-app.png build/icon.iconset/icon_512x512.png
          iconutil -c icns build/icon.iconset -o ts-icon.icns

      - name: Build & publish macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  build-win:
    runs-on: windows-latest
    env:
      WIN_CSC_BASE64:   ${{ secrets.WIN_CSC_BASE64 }}
      WIN_CSC_PASSWORD: ${{ secrets.WIN_CSC_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      # ── Option A: Eigenes PFX-Zertifikat (falls Secret gesetzt) ────────────
      - name: Decode & import PFX certificate
        if: env.WIN_CSC_BASE64 != ''
        shell: powershell
        run: |
          $cert = [Convert]::FromBase64String("$env:WIN_CSC_BASE64")
          $certPath = "$env:RUNNER_TEMP\certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $cert)
          echo "WIN_CSC_LINK=$certPath" >> $env:GITHUB_ENV

      # ── Option B: Self-signed Zertifikat (kostenlos, läuft immer) ──────────
      - name: Generate self-signed code signing certificate
        if: env.WIN_CSC_BASE64 == ''
        shell: powershell
        run: |
          $randPass = [System.Guid]::NewGuid().ToString()
          $pass = ConvertTo-SecureString -String $randPass -Force -AsPlainText
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=Björn Sydow - TeachSmarter, O=TeachSmarter, L=Germany, C=DE" `
            -FriendlyName "TeachSmarter Code Signing" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -KeyExportPolicy Exportable `
            -KeySpec Signature `
            -KeyLength 2048 `
            -KeyAlgorithm RSA `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(3)
          $certPath = "$env:RUNNER_TEMP\selfsigned.pfx"
          Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $pass | Out-Null
          echo "WIN_CSC_LINK=$certPath"   >> $env:GITHUB_ENV
          echo "WIN_CSC_PASSWORD=$randPass" >> $env:GITHUB_ENV
          Write-Host "Self-signed cert created: $($cert.Subject)"

      - name: Build & publish Windows
        run: npm run build:win
        env:
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK:         ${{ env.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ env.WIN_CSC_PASSWORD }}

  publish-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Release-ID über tag_name suchen (könnte Draft sein)
          RELEASE_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=10" \
            | python3 -c "import sys,json; releases=json.load(sys.stdin); r=[x for x in releases if x['tag_name']=='$TAG']; print(r[0]['id'] if r else '')")
          if [ -z "$RELEASE_ID" ]; then
            echo "Keine Release für Tag $TAG gefunden — übersprungen"
            exit 0
          fi
          curl -s -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"draft":false,"name":"TeachSmarter '"$TAG"'","body":"TeachSmarter '"$TAG"' — automatisch gebaut und veröffentlicht."}' \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
          echo "Release $RELEASE_ID als Published markiert."
